allowBuilds:
  '@swc/core': true
  esbuild: true

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild

packages:
  - '.'
  - 'packages/*'
  - 'apps/*'

# Vite+ toolchain: alias `vite` to the Vite+ core so `vp` drives the build,
# matching hybr1d-frontend / headless-view.
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest

overrides:
  vite: 'catalog:'
  # Security: force patched versions of vulnerable transitive deps (Dependabot).
  # Both arrive via react-select (a peer dep, externalized from the build).
  '@babel/runtime': '^7.26.10' # GHSA-968p-4wvh-cqc8 (ReDoS), fixed in 7.26.10
  yaml: '^1.10.3' # GHSA-48c2-rrv3-qjmp (DoS), fixed in 1.10.3; stay on v1 for cosmiconfig@7

peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: '*'
