name: Publish to npm

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: ["*"]
env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Vite+ (node 24 + pnpm + npm auth)
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
          registry-url: "https://registry.npmjs.org"
      - name: Install Packages
        run: vp install
      - name: Build
        run: vp run build
      - name: Publish Package
        # publish only on v* tag pushes — PR runs are CI-only (a PR run once
        # published a version before the tag did)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: slack - build success
        uses: act10ns/slack@v2.2.0
        with:
          status: ${{ job.status }}
          channel: '#alerts-deploys'
          message:
            'Charizard was successfully published to npm'
        if: success() && startsWith(github.ref, 'refs/tags/v')
      - name: slack - build failed
        uses: act10ns/slack@v2.2.0
        with:
          status: ${{ job.status }}
          channel: '#alerts-deploys'
          message:
            'Charizard has failed to publish to npm'
        if: failure() && startsWith(github.ref, 'refs/tags/v')
